<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sagittarius Artemis — 剧本宇宙</title>

<style>

/* WHITE MINIMAL THEME */
@font-face {
  font-family: 'ZiTiGuanJiaFangSongTi';
  src: url('/sagittarius-portal/fonts/ZiTiGuanJiaFangSongTi.woff2') format('woff2');
  font-display: swap;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#ffffff;color:#111;min-height:100vh;overflow-x:hidden}
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:#ffffff}
#login-screen::before{display:none}
#login-screen::after{display:none}
.login-card{position:relative;z-index:1;background:#fafafa;border:1px solid #e5e5e5;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;text-align:center;color:#111}
.login-card h1{font-size:2em;color:#000;margin-bottom:6px;font-weight:700}
.login-card h2{font-size:1em;color:#666;margin-bottom:32px;font-weight:300}
.login-card input{width:100%;padding:14px 18px;background:#fff;border:1px solid #ccc;border-radius:10px;color:#111;font-size:1em;outline:none;transition:.3s;margin-bottom:12px}
.login-card input:focus{border-color:#666}
.login-card button{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:10px;font-size:1.05em;cursor:pointer;transition:.3s;letter-spacing:1px;margin-top:12px}
.login-card button:hover{background:#333}
.login-card .error-msg{color:#e53e3e;margin-top:12px;font-size:.9em;min-height:20px}
.back-link{position:absolute;top:16px;left:16px;z-index:2;color:#666;text-decoration:none;font-size:.85em;transition:.3s}
.back-link:hover{color:#111}
#app{display:none;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:#fafafa;border-bottom:1px solid #e5e5e5;padding:0 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
nav a{display:inline-block;padding:14px 18px;color:#666;text-decoration:none;font-size:.92em;transition:.3s;border-bottom:2px solid transparent}
nav a:hover,nav a.active{color:#111;border-bottom-color:#111}
nav .nav-brand{font-size:1.15em;color:#111;margin-right:24px;font-weight:600;letter-spacing:2px}
.page{padding:32px 24px;max-width:1100px;margin:0 auto;display:none}
.page.active{display:block}
h2{font-size:1.6em;color:#111;margin-bottom:20px;font-weight:600;border-bottom:1px solid #e5e5e5;padding-bottom:12px}
.work-card{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:28px;margin-bottom:20px;transition:.3s}
.work-card:hover{border-color:#999}
.work-card h3{color:#111;font-size:1.25em;margin-bottom:8px;font-weight:600}
.work-card .meta{color:#888;font-size:.85em;margin-bottom:12px}
.work-card p{line-height:1.7;font-size:.93em;color:#555}
.char-controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.char-controls select,.char-controls input{padding:10px 14px;background:#fff;border:1px solid #ccc;border-radius:8px;color:#111;font-size:.9em;outline:none}
.char-controls select:focus,.char-controls input:focus{border-color:#666}
.char-controls input{flex:1;min-width:200px}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.char-card{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:20px;transition:.3s;cursor:pointer}
.char-card:hover{border-color:#999;background:#f5f5f5}
.char-card h4{color:#111;font-size:1.1em;margin-bottom:4px;font-weight:600}
.char-card .source{display:inline-block;background:#f0f0f0;color:#666;padding:2px 10px;border-radius:4px;font-size:.78em;margin-bottom:8px}
.char-card .role{color:#555;font-size:.88em;line-height:1.6;margin-bottom:6px}
.char-card .attrs{color:#666;font-size:.82em;line-height:1.5}
.char-card .rels{color:#888;font-size:.82em;margin-top:4px}
.char-detail{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.3);align-items:center;justify-content:center}
.char-detail.show{display:flex}
.char-detail-inner{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:32px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;position:relative}
.char-detail-inner h3{color:#111;font-size:1.4em;margin-bottom:12px}
.char-detail-inner .close-btn{position:absolute;top:12px;right:16px;background:none;border:0;color:#888;font-size:1.5em;cursor:pointer}
.char-detail-inner .close-btn:hover{color:#111}
.char-detail-inner .excerpt{background:#fafafa;border-left:2px solid #ccc;padding:12px 16px;margin-top:12px;border-radius:0 8px 8px 0;font-size:.85em;color:#555;line-height:1.7;font-style:italic}
.gen-section{max-width:700px}
.gen-section textarea{width:100%;padding:14px;background:#fff;border:1px solid #ccc;border-radius:10px;color:#111;font-size:.95em;resize:vertical;min-height:100px;outline:none}
.gen-section textarea:focus{border-color:#666}
.gen-section button{padding:12px 28px;margin-top:16px;background:#111;color:#fff;border:none;border-radius:10px;font-size:1em;cursor:pointer;transition:.3s}
.gen-section button:hover:not(:disabled){background:#333}
.gen-section button:disabled{opacity:.5;cursor:not-allowed}
.gen-output{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:24px;margin-top:20px;line-height:1.8;font-size:.93em;white-space:pre-wrap;display:none;color:#111}
.gen-output.show{display:block}
.story-card{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:20px;margin-bottom:16px}
.story-card .story-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.story-card .story-prompt{color:#111;font-size:.95em;font-weight:600;flex:1}
.story-card .story-date{color:#888;font-size:.8em}
.story-card .story-body{color:#555;font-size:.9em;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-bottom:10px}
.story-card button{padding:6px 16px;background:#fff;border:1px solid #ccc;border-radius:6px;color:#111;font-size:.82em;cursor:pointer;transition:.3s}
.story-card button:hover{border-color:#666;color:#000}
#export-btn{padding:12px 28px;background:#111;color:#fff;border:none;border-radius:10px;font-size:1em;cursor:pointer;transition:.3s;margin-bottom:20px}
#export-btn:hover{background:#333}
.export-area textarea{width:100%;padding:14px;background:#fff;border:1px solid #ccc;border-radius:10px;color:#111;font-size:.85em;min-height:200px;resize:vertical;outline:none}
footer{text-align:center;padding:24px;color:#888;font-size:.82em;border-top:1px solid #e5e5e5;margin-top:24px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e5e5;border-top-color:#666;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.char-count{color:#888;font-size:.82em;margin-left:8px}
.original-viewer{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:24px;max-height:70vh;overflow-y:auto;line-height:2;font-size:.9em;white-space:pre-wrap;color:#555;display:none}
.original-viewer::-webkit-scrollbar{width:6px}
.original-viewer::-webkit-scrollbar-track{background:#f0f0f0;border-radius:3px}
.original-viewer::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
@media(max-width:720px){
nav{padding:0 12px;gap:2px}
nav a{padding:10px 12px;font-size:.82em}
nav .nav-brand{margin-right:8px;font-size:1em}
.page{padding:20px 12px}
.char-grid{grid-template-columns:1fr}
.login-card{padding:32px 24px;max-width:340px}
.char-controls{flex-direction:column}
}

</style>
