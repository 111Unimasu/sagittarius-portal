<script>
async function sha256(m){const e=new TextEncoder().encode(m);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

const HASH='c3c471328afcc148cf5fe6e7275c65a5cbe95bd13e047357ae2a8c9edce9fdb8';

if(sessionStorage.getItem('artemis_key')==='1'){
 document.getElementById('login-screen').style.display='none';
 document.getElementById('app').style.display='block';
 initApp();
}

async function login(){
 const pwd=document.getElementById('pwd').value.trim();
 const err=document.getElementById('err');
 if(!pwd){err.textContent='请输入密码';return}
 err.textContent='验证中...';
 const h=await sha256(pwd);
 if(h===HASH){
  sessionStorage.setItem('artemis_key','1');
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  err.textContent='';
  initApp();
 }else{
  err.textContent='密码错误';
 }
}

function initApp(){
 renderHome();
 renderChars();
 renderGenerate();
 renderStories();
 renderExport();
 setupNav();
}

function setupNav(){
 document.querySelectorAll('.nav-link').forEach(a=>{
  a.addEventListener('click',e=>{
   e.preventDefault();
   document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
   a.classList.add('active');
   document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
   document.getElementById(a.dataset.page).classList.add('active');
   if(a.dataset.page==='stories')renderStories();
  });
 });
}

function filterChars(){
 const src=document.getElementById('srcFilter')?.value||'';
 const q=(document.getElementById('charSearch')?.value||'').toLowerCase();
 const grid=document.getElementById('charGrid');
 let filtered=CHARS;
 if(src)filtered=filtered.filter(ch=>ch.source===src);
 if(q)filtered=filtered.filter(ch=>ch.name.includes(q)||ch.role.includes(q)||ch.attrs.includes(q)||ch.rels.includes(q));
 document.getElementById('charCnt').textContent=filtered.length+'个角色';
 grid.innerHTML=filtered.map(ch=>`
<div class="char-card" onclick="showCharDetail('${ch.id}')">
<h4>${ch.name}</h4>
<span class="source">${ch.source}</span>
<div class="role">${ch.role.substring(0,80)}${ch.role.length>80?'…':''}</div>
<div class="attrs">🎯 ${ch.attrs.substring(0,70)}${ch.attrs.length>70?'…':''}</div>
</div>`).join('');
}

<p style="color:#7788aa;line-height:1.6;margin:8px 0"><strong>🔗 关系：</strong>${ch.rels}</p>
<div class="excerpt">"${ch.excerpt}"</div>
`;
 document.getElementById('charDetail').classList.add('show');
}

async function generateStory(){
 if(isGenerating)return;
 const prompt=document.getElementById('genPrompt').value.trim();
 if(!prompt){alert('请输入创作提示');return}
 isGenerating=true;
 const btn=document.getElementById('genBtn');
 btn.disabled=true;
 btn.innerHTML='<span class="spinner"></span>生成中…';
 const out=document.getElementById('genOutput');
 out.classList.remove('show');
 out.textContent='';

 try{
  const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
   method:'POST',
   headers:{'Content-Type':'application/json','Authorization':'Bearer sk-73d9b88bc3524ff9b844cedb03430789'},
   body:JSON.stringify({
    model:'deepseek-chat',
    messages:[
     {role:'system',content:'你是一位专业的小说/剧本创作助手，精通《天行》《元镜》《弦知》三个宇宙的世界观和角色。用户会给出一个创作提示，你需要在尊重原著设定的基础上，创作一段精彩的剧情。保持原文的文学风格和叙事质感。'},
     {role:'user',content:prompt}
    ],
    temperature:0.8,
    max_tokens:4096
   })
  });
  const data=await resp.json();
  const story=data.choices?.[0]?.message?.content||(data.error?.message||'生成失败，请稍后重试');
  out.textContent=story;
  out.classList.add('show');
  // Save
  const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
  stories.unshift({prompt,story,date:new Date().toISOString()});
  if(stories.length>50)stories.length=50;
  localStorage.setItem('artemis_stories',JSON.stringify(stories));
 }catch(e){
  out.textContent='网络错误：'+e.message;
  out.classList.add('show');
 }
 isGenerating=false;
 btn.disabled=false;
 btn.textContent='🚀 生成故事';
}

function renderStories(){
 const s=document.getElementById('stories');
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 if(stories.length===0){
  s.innerHTML='<h2>📖 已生成故事</h2><p style="color:#667788;padding:40px 0;text-align:center">暂无已生成的故事。去✨故事生成页面创作吧！</p>';
  return;
 }
 s.innerHTML=`
<h2>📖 已生成故事 (${stories.length})</h2>
<p style="color:#667788;margin-bottom:16px">所有故事保存在本地浏览器中。清除浏览器数据会导致故事丢失。请定期使用「💾 导出」功能备份。</p>
${stories.map((st,i)=>`
<div class="story-card">
<div class="story-header">
<span class="story-prompt">📝 ${escHtml(st.prompt)}</span>
<span class="story-date">${new Date(st.date).toLocaleString('zh-CN')}</span>

<div class="story-body">${escHtml(st.story)}</div>
<div style="display:flex;gap:8px">
<button onclick="copyStory(${i})">📋 复制</button>

</div>
</div>`).join('')}`;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function copyStory(i){
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 if(!stories[i])return;
 navigator.clipboard.writeText(stories[i].story).then(()=>alert('已复制到剪贴板')).catch(()=>alert('复制失败'));
}

function deleteStory(i){
 if(!confirm('确定删除这个故事？此操作不可撤销。'))return;
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 stories.splice(i,1);
 localStorage.setItem('artemis_stories',JSON.stringify(stories));
 renderStories();
}

function exportStories(){
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 const json=JSON.stringify(stories,null,2);
 document.getElementById('exportData').value=json;
 const blob=new Blob([json],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='artemis-stories-'+new Date().toISOString().slice(0,10)+'.json';
 a.click();
}

function importStories(){document.getElementById('importFile').click()}
function handleImport(e){
 const file=e.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=function(){
  try{
   const data=JSON.parse(reader.result);
   if(!Array.isArray(data))throw new Error('格式错误');
   const existing=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
   const merged=data.concat(existing).slice(0,50);
   localStorage.setItem('artemis_stories',JSON.stringify(merged));
   alert('成功导入 '+data.length+' 个故事（合并后共 '+merged.length+' 个）');
   renderStories();
   renderExport();
  }catch(e){alert('导入失败：'+e.message)}
 };
 reader.readAsText(file);
 e.target.value='';
}

<option value="天行/弦知">天行/弦知（跨作品）</option>
</select>
<input type="text" id="charSearch" placeholder="搜索角色…" oninput="filterChars()">
</div>
<div class="char-grid" id="charGrid"></div>
`;
 filterChars();
}

function filterChars(){
 const src=document.getElementById('srcFilter')?.value||'';
 const q=(document.getElementById('charSearch')?.value||'').toLowerCase();
 const grid=document.getElementById('charGrid');
 let filtered=CHARS;
 if(src)filtered=filtered.filter(ch=>ch.source===src);
 if(q)filtered=filtered.filter(ch=>ch.name.includes(q)||ch.role.includes(q)||ch.attrs.includes(q)||ch.rels.includes(q));
 document.getElementById('charCnt').textContent=filtered.length+'个角色';
 grid.innerHTML=filtered.map(ch=>`
<div class="char-card" onclick="showCharDetail('${ch.id}')">
<h4>${ch.name}</h4>
<span class="source">${ch.source}</span>
<div class="role">${ch.role.substring(0,80)}${ch.role.length>80?'…':''}</div>
<div class="attrs">🎯 ${ch.attrs.substring(0,70)}${ch.attrs.length>70?'…':''}</div>
</div>`).join('');
}

function showCharDetail(id){
 const ch=CHARS.find(c=>c.id===id);
 if(!ch)return;
 document.getElementById('charDetailInner').innerHTML=`
<button class="close-btn" onclick="document.getElementById('charDetail').classList.remove('show')">✕</button>
<h3>${ch.name} <span class="source">${ch.source}</span></h3>
<p style="color:#aab8c8;line-height:1.8;margin:8px 0">${ch.role}</p>
<p style="color:#8899aa;line-height:1.6;margin:8px 0"><strong>🎯 能力/属性：</strong>${ch.attrs}</p>
<p style="color:#7788aa;line-height:1.6;margin:8px 0"><strong>🔗 关系：</strong>${ch.rels}</p>
<div class="excerpt">"${ch.excerpt}"</div>
`;
 document.getElementById('charDetail').classList.add('show');
}

// GENERATE
let isGenerating=false;
function renderGenerate(){
 document.getElementById('generate').innerHTML=`
<div class="gen-section">
<h2>✨ AI故事生成</h2>
<p style="color:#8899aa;margin-bottom:16px;line-height:1.6">输入创作提示，DeepSeek将基于《天行》《元镜》《弦知》的世界观和角色为你创作一段精彩剧情。<br>示例：「张潮洋在东方之门遇到凌霄」「李纯音听到赵巍六神的心频」</p>
<textarea id="genPrompt" placeholder="输入你的创作提示…"></textarea>
<button id="genBtn" onclick="generateStory()">🚀 生成故事</button>
<div id="genOutput" class="gen-output"></div>
</div>`;
}

async function generateStory(){
 if(isGenerating)return;
 const prompt=document.getElementById('genPrompt').value.trim();
 if(!prompt){alert('请输入创作提示');return}
 isGenerating=true;
 const btn=document.getElementById('genBtn');
 btn.disabled=true;
 btn.innerHTML='<span class="spinner"></span>生成中…';
 const out=document.getElementById('genOutput');
 out.classList.remove('show');
 out.textContent='';

 try{
  const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
   method:'POST',
   headers:{'Content-Type':'application/json','Authorization':'Bearer sk-73d9b88bc3524ff9b844cedb03430789'},
   body:JSON.stringify({
    model:'deepseek-chat',
    messages:[
     {role:'system',content:'你是一位专业的小说/剧本创作助手，精通《天行》《元镜》《弦知》三个宇宙的世界观和角色。用户会给出一个创作提示，你需要在尊重原著设定的基础上，创作一段精彩的剧情。保持原文的文学风格和叙事质感。'},
     {role:'user',content:prompt}
    ],
    temperature:0.8,
    max_tokens:4096
   })
  });
  const data=await resp.json();
  const story=data.choices?.[0]?.message?.content||(data.error?.message||'生成失败，请稍后重试');
  out.textContent=story;
  out.classList.add('show');
  // Save
  const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
  stories.unshift({prompt,story,date:new Date().toISOString()});
  if(stories.length>50)stories.length=50;
  localStorage.setItem('artemis_stories',JSON.stringify(stories));
 }catch(e){
  out.textContent='网络错误：'+e.message;
  out.classList.add('show');
 }
 isGenerating=false;
 btn.disabled=false;
 btn.textContent='🚀 生成故事';
}

// STORIES
function renderStories(){
 const s=document.getElementById('stories');
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 if(stories.length===0){
  s.innerHTML='<h2>📖 已生成故事</h2><p style="color:#667788;padding:40px 0;text-align:center">暂无已生成的故事。去✨故事生成页面创作吧！</p>';
  return;
 }
 s.innerHTML=`
<h2>📖 已生成故事 (${stories.length})</h2>
<p style="color:#667788;margin-bottom:16px">所有故事保存在本地浏览器中。清除浏览器数据会导致故事丢失。请定期使用「💾 导出」功能备份。</p>
${stories.map((st,i)=>`
<div class="story-card">
<div class="story-header">
<span class="story-prompt">📝 ${escHtml(st.prompt)}</span>
<span class="story-date">${new Date(st.date).toLocaleString('zh-CN')}</span>
</div>
<div class="story-body">${escHtml(st.story)}</div>
<div style="display:flex;gap:8px">
<button onclick="copyStory(${i})">📋 复制</button>
<button onclick="deleteStory(${i})" style="border-color:rgba(255,100,100,0.3);color:#ff6b6b">🗑 删除</button>
</div>
</div>`).join('')}`;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function copyStory(i){
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 if(!stories[i])return;
 navigator.clipboard.writeText(stories[i].story).then(()=>alert('已复制到剪贴板')).catch(()=>alert('复制失败'));
}

function deleteStory(i){
 if(!confirm('确定删除这个故事？此操作不可撤销。'))return;
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 stories.splice(i,1);
 localStorage.setItem('artemis_stories',JSON.stringify(stories));
 renderStories();
}

// EXPORT
function renderExport(){
 document.getElementById('export').innerHTML=`
<h2>💾 导出故事</h2>
<p style="color:#8899aa;margin-bottom:16px;line-height:1.6">将所有已生成的故事导出为JSON文件，可用于备份或迁移。</p>
<button id="export-btn" onclick="exportStories()">📥 下载 JSON（全部故事）</button>
<div class="export-area" style="margin-top:16px">
<textarea id="exportData" readonly placeholder="点击上面的按钮生成导出数据…"></textarea>
</div>
<button id="import-btn" style="margin-top:12px;padding:10px 20px;background:rgba(30,30,50,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#c8c8d0;cursor:pointer" onclick="importStories()">📤 导入 JSON</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
`;
}

function exportStories(){
 const stories=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
 const json=JSON.stringify(stories,null,2);
 document.getElementById('exportData').value=json;
 const blob=new Blob([json],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='artemis-stories-'+new Date().toISOString().slice(0,10)+'.json';
 a.click();
}

function importStories(){document.getElementById('importFile').click()}
function handleImport(e){
 const file=e.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=function(){
  try{
   const data=JSON.parse(reader.result);
   if(!Array.isArray(data))throw new Error('格式错误');
   const existing=JSON.parse(localStorage.getItem('artemis_stories')||'[]');
   const merged=data.concat(existing).slice(0,50);
   localStorage.setItem('artemis_stories',JSON.stringify(merged));
   alert('成功导入 '+data.length+' 个故事（合并后共 '+merged.length+' 个）');
   renderStories();
   renderExport();
  }catch(e){alert('导入失败：'+e.message)}
 };
 reader.readAsText(file);
 e.target.value='';
}
</script>
</body>
</html>
