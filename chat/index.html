<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sagittarius Third Sun</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>

/* WHITE MINIMAL THEME */
@font-face {
  font-family: 'ZiTiGuanJiaFangSongTi';
  src: url('/sagittarius-portal/fonts/ZiTiGuanJiaFangSongTi.woff2') format('woff2');
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #ffffff; min-height: 100vh; color: #111111; overflow: hidden; }
.stars { display: none; }
.container { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: 0 auto; border-left: 1px solid #e5e5e5; border-right: 1px solid #e5e5e5; }
.header { padding: 20px; text-align: center; border-bottom: 1px solid #e5e5e5; background: #fafafa; }
.header h1 { font-size: 28px; font-weight: 600; color: #000; letter-spacing: 3px; }
.header p { font-size: 12px; color: #888; margin-top: 5px; letter-spacing: 2px; }
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: #ffffff; }
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: #f0f0f0; }
.chat-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.message-container { display: flex; margin-bottom: 20px; animation: fadeIn 0.3s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.user-message { justify-content: flex-end; }
.ai-message { justify-content: flex-start; }
.message-bubble { max-width: 70%; padding: 15px 20px; border-radius: 16px; position: relative; }
.user-message .message-bubble { background: #f0f0f0; border: 1px solid #e5e5e5; border-radius: 16px 16px 4px 16px; color: #111; }
.ai-message .message-bubble { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 16px 16px 16px 4px; color: #111; }
.message-content { font-size: 15px; line-height: 1.6; color: #111; word-wrap: break-word; }
.message-content code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 14px; color: #111; }
.message-content pre { background: #f5f5f5; padding: 15px; border-radius: 10px; overflow-x: auto; margin: 10px 0; border: 1px solid #e5e5e5; }
.message-content pre code { background: transparent; padding: 0; color: #111; }
.message-content table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
.message-content th, .message-content td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e5e5e5; }
.message-content th { background: #f0f0f0; color: #111; }
.message-content tr:last-child td { border-bottom: none; }
.message-content blockquote { border-left: 3px solid #ccc; padding-left: 15px; margin: 10px 0; color: #666; font-style: italic; }
.input-area { padding: 20px; border-top: 1px solid #e5e5e5; background: #fafafa; }
.input-container { display: flex; gap: 15px; max-width: 100%; }
#message-input { flex: 1; padding: 15px 20px; border: 1px solid #ccc; border-radius: 24px; background: #ffffff; color: #111; font-size: 15px; outline: none; transition: border-color 0.3s ease; }
#message-input:focus { border-color: #666; }
#message-input::placeholder { color: #999; }
#send-btn { background: #111; color: #fff; border: none; padding: 0 30px; border-radius: 24px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
#send-btn:hover { background: #333; }
#send-btn:active { opacity: 0.8; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.loading { display: inline-flex; gap: 5px; }
.loading-dot { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: loading 1.4s infinite ease-in-out; }
.loading-dot:nth-child(1) { animation-delay: 0s; } .loading-dot:nth-child(2) { animation-delay: 0.2s; } .loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loading { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
.footer { padding: 10px; text-align: center; font-size: 11px; color: #888; border-top: 1px solid #e5e5e5; }
.back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; background: #fafafa; border: 1px solid #ccc; color: #666; padding: 8px 18px; border-radius: 20px; cursor: pointer; text-decoration: none; font-size: 14px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
.back-btn:hover { background: #f0f0f0; border-color: #999; color: #111; }
@media (max-width: 768px) {
  .container { border-left: none; border-right: none; }
  .header h1 { font-size: 22px; }
  .message-bubble { max-width: 85%; }
  .input-container { flex-direction: column; }
  #send-btn { padding: 15px; }
}

</style>
</head>
<body>
    <div class="stars"></div>
    <a href="../" class="back-btn">← 返回大门</a>
    
    <div class="container">
        <div class="header">
            <h1>Sagittarius Third Sun</h1>
            <p>SPACE TECH AI ASSISTANT</p>
        </div>
        
        <div class="chat-area" id="chat-area">
            <div class="message-container ai-message">
                <div class="message-bubble">
                    <div class="message-content">
                        您好！我是 Sagittarius Third Sun 智能助手，由 DeepSeek 驱动。有什么我可以帮助您的吗？
                    </div>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="message-input" placeholder="输入您的消息..." autocomplete="off">
                <button id="send-btn">
                    <span>发送</span>
                </button>
            </div>
        </div>
        
        <div class="footer">
            @张潮洋 · 2006 · 江苏南京 · 南财红山 · Sagittarius Third Sun
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // 对话历史（保留上下文）
        const messageHistory = [
            { role: 'system', content: '你是 Sagittarius Third Sun 智能助手，请用中文回复用户。' }
        ];

        function addMessage(message, isUser) {
            const container = document.createElement('div');
            container.className = `message-container ${isUser ? 'user-message' : 'ai-message'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            // 使用 marked 渲染 Markdown
            content.innerHTML = marked.parse(message);
            
            bubble.appendChild(content);
            container.appendChild(bubble);
            chatArea.appendChild(container);
            
            // 滚动到底部
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showLoading() {
            const container = document.createElement('div');
            container.className = 'message-container ai-message loading-message';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
            
            bubble.appendChild(loading);
            container.appendChild(bubble);
            chatArea.appendChild(container);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideLoading() {
            const loadingMessage = document.querySelector('.loading-message');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 添加用户消息
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            
            // 更新对话历史
            messageHistory.push({ role: 'user', content: message });
            
            // 显示加载状态
            showLoading();
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-73d9b88bc3524ff9b844cedb03430789'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messageHistory
                    })
                });
                
                const data = await response.json();
                
                // 隐藏加载状态
                hideLoading();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const aiText = data.choices[0].message.content;
                    
                    // 更新对话历史
                    messageHistory.push({ role: 'assistant', content: aiText });
                    
                    // 显示AI消息
                    addMessage(aiText, false);
                } else {
                    const errorMsg = data.error ? data.error.message : '未知错误';
                    addMessage('抱歉，请求失败: ' + errorMsg, false);
                }
            } catch (error) {
                hideLoading();
                addMessage('抱歉，发生了错误: ' + error.message, false);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);
        
        // 回车键发送
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
