<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sagittarius Third Sun</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
@font-face {
  font-family: 'ZiTiGuanJiaFangSongTi';
  src: url('/fonts/ZiTiGuanJiaFangSongTi.woff2') format('woff2');
  font-display: swap;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ZiTiGuanJiaFangSongTi', Tahoma, Geneva, Verdana, sans-serif;
            background: url('bg.webp') center/cover no-repeat fixed #0a0a1a;
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* 星空背景效果 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 230px 80px, #fff, transparent),
                radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 370px 60px, #fff, transparent),
                radial-gradient(2px 2px at 450px 200px, rgba(255,255,255,0.8), transparent);
            background-repeat: repeat;
            background-size: 500px 250px;
            animation: twinkle 5s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            border-left: 1px solid rgba(255, 215, 0, 0.1);
            border-right: 1px solid rgba(255, 215, 0, 0.1);
        }

        /* 头部 */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            background: linear-gradient(90deg, transparent 0%, rgba(255, 215, 0, 0.05) 50%, transparent 100%);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(90deg, #ffd700, #ffec8b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 3px;
        }

        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: rgba(255, 215, 0, 0.1);
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ffd700, #b8860b);
            border-radius: 3px;
        }

        /* 消息容器 */
        .message-container {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-message {
            justify-content: flex-start;
        }

        /* 消息气泡 */
        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px 20px 5px 20px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
        }

        .ai-message .message-bubble {
            background: linear-gradient(135deg, rgba(100, 100, 150, 0.2) 0%, rgba(50, 50, 100, 0.15) 100%);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 20px 20px 20px 5px;
            box-shadow: 0 4px 20px rgba(100, 150, 255, 0.1);
        }

        /* 消息内容 */
        .message-content {
            font-size: 15px;
            line-height: 1.6;
            color: #e0e0e0;
            word-wrap: break-word;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'ZiTiGuanJiaFangSongTi', monospace;
            font-size: 14px;
            color: #ffd700;
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .message-content pre code {
            background: transparent;
            padding: 0;
            color: #e0e0e0;
        }

        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .message-content th, .message-content td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .message-content th {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }

        .message-content tr:last-child td {
            border-bottom: none;
        }

        .message-content blockquote {
            border-left: 3px solid #ffd700;
            padding-left: 15px;
            margin: 10px 0;
            color: #aaa;
            font-style: italic;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            background: linear-gradient(90deg, transparent 0%, rgba(255, 215, 0, 0.05) 50%, transparent 100%);
        }

        .input-container {
            display: flex;
            gap: 15px;
            max-width: 100%;
        }

        #message-input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #message-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        #message-input::placeholder {
            color: #666;
        }

        #send-btn {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            border: none;
            color: #1a1a1a;
            padding: 0 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        #send-btn:active {
            transform: scale(0.98);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载状态 */
        .loading {
            display: inline-flex;
            gap: 5px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: loading 1.4s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loading {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* 底部署名 */
        .footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: #555;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                border-left: none;
                border-right: none;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .message-bubble {
                max-width: 85%;
            }
            
            .input-container {
                flex-direction: column;
            }
            
            #send-btn {
                padding: 15px;
            }
        }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4); color: #ffd700; padding: 8px 18px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 14px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        .back-btn:hover { background: rgba(255,215,0,0.25); border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
    
.back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4); color: #ffd700; padding: 8px 18px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 14px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
.back-btn:hover { background: rgba(255,215,0,0.25); border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
</style>
</head>
<body>
    <div class="stars"></div>
    <a href="../" class="back-btn">← 返回大门</a>
    
    <div class="container">
        <div class="header">
            <h1>Sagittarius Third Sun</h1>
            <p>SPACE TECH AI ASSISTANT</p>
        </div>
        
        <div class="chat-area" id="chat-area">
            <div class="message-container ai-message">
                <div class="message-bubble">
                    <div class="message-content">
                        您好！我是 Sagittarius Third Sun 智能助手，由 DeepSeek 驱动。有什么我可以帮助您的吗？
                    </div>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="message-input" placeholder="输入您的消息..." autocomplete="off">
                <button id="send-btn">
                    <span>发送</span>
                </button>
            </div>
        </div>
        
        <div class="footer">
            @张潮洋 · 2006 · 江苏南京 · 南财红山 · Sagittarius Third Sun
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // 对话历史（保留上下文）
        const messageHistory = [
            { role: 'system', content: '你是 Sagittarius Third Sun 智能助手，请用中文回复用户。' }
        ];

        function addMessage(message, isUser) {
            const container = document.createElement('div');
            container.className = `message-container ${isUser ? 'user-message' : 'ai-message'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            // 使用 marked 渲染 Markdown
            content.innerHTML = marked.parse(message);
            
            bubble.appendChild(content);
            container.appendChild(bubble);
            chatArea.appendChild(container);
            
            // 滚动到底部
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showLoading() {
            const container = document.createElement('div');
            container.className = 'message-container ai-message loading-message';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
            
            bubble.appendChild(loading);
            container.appendChild(bubble);
            chatArea.appendChild(container);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideLoading() {
            const loadingMessage = document.querySelector('.loading-message');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 添加用户消息
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            
            // 更新对话历史
            messageHistory.push({ role: 'user', content: message });
            
            // 显示加载状态
            showLoading();
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-73d9b88bc3524ff9b844cedb03430789'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messageHistory
                    })
                });
                
                const data = await response.json();
                
                // 隐藏加载状态
                hideLoading();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const aiText = data.choices[0].message.content;
                    
                    // 更新对话历史
                    messageHistory.push({ role: 'assistant', content: aiText });
                    
                    // 显示AI消息
                    addMessage(aiText, false);
                } else {
                    const errorMsg = data.error ? data.error.message : '未知错误';
                    addMessage('抱歉，请求失败: ' + errorMsg, false);
                }
            } catch (error) {
                hideLoading();
                addMessage('抱歉，发生了错误: ' + error.message, false);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);
        
        // 回车键发送
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
