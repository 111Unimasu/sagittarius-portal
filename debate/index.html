<body>

    <div class="container">

        <header>

            <h1>✧ Sagittarius Witchcraft ✧</h1>

                    <label for="background">背景 / 环境 / 预设</label>

                    <label for="personaB">人物 B 的性格与逻辑思维模式</label>

                </div>

            <div class="input-section">

                        <label><input type="radio" name="questioner" value="B"> 人物 B</label>

            <div class="dialogue-wrapper" id="dialogueWrapper">

                <div class="empty-dialogue">对话将在此展示，请填写上方信息后点击"开始推理"</div>

        </div>

    <script>

        const MIN_ROUNDS = 3;

        const MAX_ROUNDS = 6;



        let currentRound = 0;

        let isRunning = false;

        let dialogueHistory = [];



        const startBtn = document.getElementById('startBtn');

        const dialogueWrapper = document.getElementById('dialogueWrapper');

        const dialogueSection = document.getElementById('dialogueSection');

        const resultContent = document.getElementById('resultContent');



        const backgroundInput = document.getElementById('background');

        const personaAInput = document.getElementById('personaA');

        const personaBInput = document.getElementById('personaB');

        const questionInput = document.getElementById('question');



        // DeepSeek API 配置（已预置）

        const API_ENDPOINT = 'https://api.deepseek.com/v1/chat/completions';

        const API_KEY = 'sk-73d9b88bc3524ff9b844cedb03430789';



        function addDialogueBubble(speaker, content) {

            const bubble = document.createElement('div');

            bubble.className = `dialogue-bubble speaker-${speaker.toLowerCase()}`;



            const tag = document.createElement('div');

            tag.className = 'speaker-tag';

            tag.textContent = speaker === 'A' ? '◇ 人物 A' : '◆ 人物 B';



            const contentDiv = document.createElement('div');

            contentDiv.className = 'dialogue-content';

            contentDiv.textContent = content;



            bubble.appendChild(tag);

            bubble.appendChild(contentDiv);

            dialogueWrapper.appendChild(bubble);

            dialogueSection.scrollTop = dialogueSection.scrollHeight;

            dialogueHistory.push({ speaker, content });

        }



        function addJudgeBubble(content) {

            const bubble = document.createElement('div');

            bubble.className = 'dialogue-bubble';

            bubble.style.alignSelf = 'center';

            bubble.style.background = 'linear-gradient(135deg, rgba(218,165,32,0.3) 0%, rgba(184,134,11,0.3) 100%)';

            bubble.style.border = '2px solid rgba(255,215,0,0.5)';

            bubble.style.maxWidth = '95%';



            const tag = document.createElement('div');

            tag.className = 'speaker-tag';

            tag.style.color = '#ffd700';

            tag.textContent = '★ 综合分析';



            const contentDiv = document.createElement('div');

            contentDiv.className = 'dialogue-content';

            contentDiv.textContent = content;



            bubble.appendChild(tag);

            bubble.appendChild(contentDiv);

            dialogueWrapper.appendChild(bubble);

            dialogueSection.scrollTop = dialogueSection.scrollHeight;

        }



        function clearDialogue() {

            dialogueWrapper.innerHTML = '';

            dialogueHistory = [];

            currentRound = 0;

        }



        function showLoading(message = '分析中') {

            const loading = document.createElement('div');

            loading.className = 'loading-indicator';

            loading.id = 'loadingIndicator';

            loading.textContent = message;

            dialogueWrapper.appendChild(loading);

            dialogueSection.scrollTop = dialogueSection.scrollHeight;

        }



        function removeLoading() {

            const loading = document.getElementById('loadingIndicator');

            if (loading) loading.remove();

        }



        function sleep(ms) {

            return new Promise(resolve => setTimeout(resolve, ms));

        }



        function getQuestioner() {

            return document.querySelector('input[name="questioner"]:checked').value;

        }



        function getResponder(questioner) {

            return questioner === 'A' ? 'B' : 'A';

        }



        async function callDeepSeekAPI(messages) {

            try {

                const response = await fetch(API_ENDPOINT, {

                    method: 'POST',

                    headers: {

                        'Content-Type': 'application/json',

                        'Authorization': `Bearer ${API_KEY}`

                    },

                    body: JSON.stringify({

                        model: 'deepseek-chat',

                        messages: messages,

                        temperature: 0.8,

                        max_tokens: 2000

                    })

                });



                if (!response.ok) {

                    throw new Error(`API error: ${response.status}`);

                }



                const data = await response.json();

                return data.choices?.[0]?.message?.content || null;

            } catch (error) {

                console.error('API 调用失败:', error);

                return null;

            }

        }



        async function generateResponse(speaker, question, _personaDesc, context) {

            const personaDesc = speaker === 'A' ? context.personaA : context.personaB;

            const roleName = speaker === 'A' ? '人物A' : '人物B';



            const messages = [

                {

                    role: 'system',

                    content: `背景：${context.background || '未指定'}



你是一个辩论分析引擎。请你以${roleName}的身份（${personaDesc}），对上一条发言进行实质性的逻辑分析、证据反驳或论点深化。



规则：

1. 不限制字数，需要充分展开论证

2. 你必须给出具体的论据、数据或推理链，不能只表态

3. 区分事实陈述与价值判断，明确指出对方发言中的逻辑漏洞或事实错误

4. 避免空泛的哲学结论如"真理是心灵的共鸣"

5. 像真正的分析师一样工作，不要扮演角色`

                }

            ];



            dialogueHistory.forEach(d => {

                messages.push({

                    role: 'user',

                    content: `[${d.speaker === 'A' ? '人物A' : '人物B'}]: ${d.content}`

                });

            });



            messages.push({

                role: 'user',

                content: `请以${roleName}的身份，对上述对话进行回应。充分展开你的论证，可以引用数据、逻辑推理、案例分析等。`

            });



            return await callDeepSeekAPI(messages);

        }



        async function generateVerdict(context) {

            const messages = [

                {

                    role: 'system',

                    content: `你是一个客观的辩论裁判和分析师。请对以下对话进行综合分析：



背景：${context.background || '未指定'}

人物A：${context.personaA || '未设置'}

人物B：${context.personaB || '未设置'}



请从以下三个维度进行分析：

1) 双方的核心论点分别是什么

2) 哪一方的论证更有力，为什么

3) 这个问题可能被忽略的角度是什么



请用中文回复，保持客观中立，不少于200字。`

                }

            ];



            dialogueHistory.forEach(d => {

                messages.push({

                    role: 'user',

                    content: `[${d.speaker === 'A' ? '人物A' : '人物B'}]: ${d.content}`

                });

            });



            messages.push({

                role: 'user',

                content: '请对以上完整对话进行综合分析。'

            });



            return await callDeepSeekAPI(messages);

        }



                async function runReasoning() {

            if (isRunning) return;



            const background = backgroundInput.value.trim();

            const personaA = personaAInput.value.trim();

            const personaB = personaBInput.value.trim();

            const question = questionInput.value.trim();



            if (!personaA || !personaB || !question) {

                alert('请填写人物A、人物B的性格描述以及问题');

                return;

            }



            isRunning = true;

            startBtn.disabled = true;

            clearDialogue();



            const questioner = getQuestioner();

            const responder = getResponder(questioner);

            const context = { background, personaA, personaB };

            const questionerPersona = questioner === 'A' ? personaA : personaB;

            const responderPersona = responder === 'A' ? personaA : personaB;



            currentRound = 0;



            // 第一轮：直接展示用户的问题

            addDialogueBubble(questioner, question);

            currentRound++;



            await sleep(800);



            // 辩论轮次

            while (currentRound < MAX_ROUNDS) {

                showLoading('深度分析中');

                const response = await generateResponse(responder, question, responderPersona, context);

                removeLoading();



                if (response && response.trim() && !response.startsWith('[')) {

                    addDialogueBubble(responder, response);

                    currentRound++;

                }



                await sleep(800);



                if (currentRound >= MAX_ROUNDS) break;



                showLoading('深度分析中');

                const counterResponse = await generateResponse(questioner, question, questionerPersona, context);

                removeLoading();



                if (counterResponse && counterResponse.trim() && !counterResponse.startsWith('[')) {

                    addDialogueBubble(questioner, counterResponse);

                    currentRound++;

                }



                await sleep(800);

            }



            // 裁判总结

            showLoading('裁判综合分析中');

            const judgeMessages = [

                { role: 'system', content: `背景：${background || '现代社会的普遍语境'}` },

                { role: 'system', content: `人物A立场：${personaA || '理性客观'}` },

                { role: 'system', content: `人物B立场：${personaB || '感性直觉'}` },

                { role: 'system', content: '你是一个客观的辩论裁判和分析师。请对以下对话进行综合分析：\n\n1) 双方的核心论点分别是什么\n2) 哪一方的论证更有力，为什么\n3) 这个问题可能被忽略的角度是什么\n\n请以"⚖️ 裁判总结"的格式输出，使用清晰的编号和分段。' }

            ];

            dialogueHistory.forEach(d => {

                judgeMessages.push({

                    role: 'user',

                    content: `${d.speaker === 'A' ? '人物A' : '人物B'}：${d.content}`

                });

            });

            judgeMessages.push({

                role: 'user',

                content: '请做出客观的综合分析。'

            });



            const judgeVerdict = await generateVerdict(judgeMessages, 3000);

            removeLoading();

            if (judgeVerdict && !judgeVerdict.startsWith('[')) {

                resultContent.innerHTML = '<strong>⚖️ 裁判总结</strong><br><br>' + judgeVerdict.replace(/\n/g, '<br>');

                resultContent.classList.remove('empty');

            } else {

                resultContent.textContent = '分析引擎暂时不可用，请稍后重试';

            }



            // 记录日志

            try {

                await fetch('/.netlify/functions/log-conversation', {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify({

                        userInput: question,

                        aiResponse: judgeVerdict || '',

                        dialogueHistory: dialogueHistory,

                        background: background,

                        personaA: personaA,

                        personaB: personaB

                    })

                });

            } catch (e) {

                console.error('日志记录失败:', e);

            }



            isRunning = false;

            startBtn.disabled = false;

        }



        function sleep(ms) {

            return new Promise(resolve => setTimeout(resolve, ms));

        }

        startBtn.addEventListener('click', runReasoning);

    </script>

</body>

</html>
