<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagittarius Portal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: url('bg.jpg') center/cover no-repeat fixed #0a0a1a;
  color: #fff;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  overflow-y: auto;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10, 10, 26, 0.5);
  pointer-events: none;
  z-index: 0;
}

#starfield {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 20px;
}

.title {
  font-size: clamp(2rem, 6vw, 4.5rem);
  font-weight: 900;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, #ffd700 0%, #ffaa00 30%, #ffd700 60%, #ff8c00 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
  text-shadow: none;
  animation: titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow {
  0% { filter: drop-shadow(0 0 8px rgba(255,215,0,0.3)); }
  100% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); }
}

.subtitle {
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  color: rgba(255,255,255,0.7);
  font-weight: 300;
  letter-spacing: 0.15em;
  margin-bottom: 60px;
}

.cards {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 300px;
  max-width: 85vw;
  padding: 40px 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,215,0,0.15);
  text-decoration: none;
  color: inherit;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}

.card:hover {
  transform: translateY(-12px);
  border-color: #ffd700;
  box-shadow: 0 0 30px rgba(255,215,0,0.2), 0 0 60px rgba(255,215,0,0.08), inset 0 0 30px rgba(255,215,0,0.03);
}

.card:hover::before {
  opacity: 1;
}

.card-icon {
  font-size: 3rem;
  margin-bottom: 16px;
}

.card-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: #ffd700;
  margin-bottom: 10px;
}

.card-desc {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
}

.card-tag {
  display: inline-block;
  margin-top: 14px;
  padding: 4px 12px;
  border-radius: 12px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.25);
  font-size: 0.75rem;
  color: rgba(255,215,0,0.9);
}

.footer {
  position: relative;
  z-index: 1;
  margin-top: 70px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.05em;
}

@media (max-width: 640px) {
  .container { padding: 30px 10px; }
  .subtitle { margin-bottom: 30px; }
  .cards { gap: 16px; }
  .card { padding: 28px 20px; }
  .card-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .card-title { font-size: 1.2rem; }
  .card-desc { font-size: 0.8rem; }
  .footer { margin-top: 40px; }
}
</style>
</head>
<body>
<canvas id="starfield"></canvas>

<div class="container">
  <h1 class="title">Sagittarius Portal</h1>
  <p class="subtitle">人机共生 · AI 双子星</p>

  <div class="cards">
    <a href="chat/" class="card">
      <div class="card-icon">🜎</div>
      <div class="card-title">Third Sun</div>
      <div class="card-desc">AI 智能对话助手</div>
      <span class="card-tag">DeepSeek 驱动</span>
    </a>

    <a href="debate/" class="card">
      <div class="card-icon">🞮</div>
      <div class="card-title">Witchcraft</div>
      <div class="card-desc">深度辩论分析引擎</div>
      <span class="card-tag">双人观点对撞 + AI 研判</span>
    </a>

    <a href="grampus/" class="card">
      <div class="card-icon">♐</div>
      <div class="card-title">Grampus</div>
      <div class="card-desc">AI 思维链图生成器</div>
      <span class="card-tag">智能推理链可视化</span>
    </a>

    <a href="kepler/" class="card">
      <div class="card-icon">🪐</div>
      <div class="card-title">Kepler-22b</div>
      <div class="card-desc">AI 交互式故事生成器</div>
      <span class="card-tag">DeepSeek 驱动 · 无限叙事</span>
    </a>

    <a href="heaven/" class="card">
      <div class="card-icon">⚖️</div>
      <div class="card-title">Heaven</div>
      <div class="card-desc">AI 置信度裁定工具</div>
      <span class="card-tag">DeepSeek 驱动 · 交叉分析</span>
    </a>

    <a href="artemis/" class="card">
      <div class="card-icon">🎬</div>
      <div class="card-title">Artemis</div>
      <div class="card-desc">剧本宇宙 · 角色档案与故事生成</div>
      <span class="card-tag">DeepSeek 驱动 · 密码保护</span>
    </a>
  </div>

  <p class="footer">@张潮洋 · Sagittarius Portal</p>
</div>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  initStars();
}

function initStars() {
  const count = Math.floor((w * h) / 1800);
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.8 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      opacity: Math.random() * 0.8 + 0.2,
      pulse: Math.random() * Math.PI * 2
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, w, h);
  for (const s of stars) {
    s.pulse += 0.008;
    const alpha = s.opacity * (0.6 + 0.4 * Math.sin(s.pulse));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  }
  for (let i = 0; i < stars.length; i += 37) {
    const s = stars[i];
    const alpha = s.opacity * 0.4 * (0.6 + 0.4 * Math.sin(s.pulse * 1.3));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r + 0.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
